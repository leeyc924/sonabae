# 수용 기준: case3은 결과 기록만 (assertion 없음 — 복원/소실 둘 다 통과 가능).
- runFlow: _seed.yaml
- stopApp
- waitForAnimationToEnd:
    timeout: 1500
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible: "경기 기록하기"
    timeout: 10000
- tapOn: "경기 기록하기"
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: case3-after-relaunch
